services:
  ingest:
    image: ghcr.io/lennartkloock/bgp-hijacking-detection/ingest
    build:
      context: .
      args:
        BIN: ingest
    volumes:
      - ./local/ripe_cache:/app/local/cache
    depends_on:
      postgres:
        condition: service_started
    command: -o db_url=postgres://postgres:postgres@postgres/postgres -o clickhouse.url=http://clickhouse:8123 -o log_level=info,db=debug,ingest=debug -o rrc_filter=12
    networks:
      - default
    restart: unless-stopped
  detection:
    image: ghcr.io/lennartkloock/bgp-hijacking-detection/detection
    build:
      context: .
      args:
        BIN: detection
    depends_on:
      postgres:
        condition: service_started
    command: -o db_url=postgres://postgres:postgres@postgres/postgres -o log_level=info,db=debug,detection=debug -o pprof_bind=0.0.0.0:3000
    networks:
      - default
    ports:
    - 127.0.0.1:3001:3000
    restart: unless-stopped
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    networks:
      - default
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      - postgres:/var/lib/postgresql
    # command: postgres -c log_min_duration_statement=100
  clickhouse:
    image: clickhouse:26.3
    environment:
      CLICKHOUSE_PASSWORD: default
    networks:
      - default
    ports:
      - 127.0.0.1:8123:8123
      - 127.0.0.1:9000:9000
    volumes:
      - clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
  grafana:
    image: grafana/grafana:12.4
    restart: unless-stopped
    networks:
      - default
    ports:
      - 127.0.0.1:3000:3000
    volumes:
      - grafana:/var/lib/grafana

networks:
  default:
    enable_ipv6: true

volumes:
  postgres:
  clickhouse:
  grafana:
