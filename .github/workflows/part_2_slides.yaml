name: Slides Part 2
on: push
jobs:
  compile:
    runs-on: ubuntu-latest
    outputs:
      pre_release: ${{ steps.query.outputs.pre_release }}
    steps:
      - uses: actions/checkout@v5
      - uses: typst-community/setup-typst@v4.3.0
      - name: Compile main.typ
        run: typst compile slides/part_2/main.typ slides_part_2.pdf --root ./slides --font-path ./slides/fonts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: slides_part_2
          path: slides_part_2.pdf
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: compile
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: slides_part_2
      - name: Delete old release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete slides-part-2-latest --cleanup-tag
      - name: Create new release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: slides-part-2-latest
          name: Slides Part 2
          files: slides_part_2.pdf
          generate_release_notes: false
